<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Comprobante | ATP Suplementos</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"><style>body{margin:0;background:#eef1f3;font-family:Inter,sans-serif;color:#161b1f}.wrap{width:min(780px,calc(100% - 28px));margin:28px auto}.receipt{background:#fff;border-radius:20px;padding:36px;box-shadow:0 15px 50px rgba(0,0,0,.1)}header{display:flex;justify-content:space-between;gap:20px;border-bottom:3px solid #f5e900;padding-bottom:22px}header img{width:95px;height:70px;object-fit:cover;border-radius:10px}h1{font-size:22px;margin:0 0 5px}.muted{color:#68727a}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin:24px 0}.box{border:1px solid #dde2e6;border-radius:14px;padding:17px}.box h2{font-size:12px;letter-spacing:.1em;margin:0 0 12px}.box p{margin:7px 0;font-size:14px}.items{width:100%;border-collapse:collapse}.items th,.items td{text-align:left;padding:13px;border-bottom:1px solid #e4e8eb}.items th:last-child,.items td:last-child{text-align:right}.totals{margin-left:auto;width:min(330px,100%);padding-top:18px}.totals div{display:flex;justify-content:space-between;padding:7px}.totals .total{font-size:21px;font-weight:900;border-top:2px solid #161b1f;margin-top:8px;padding-top:14px}.bank{margin-top:22px;background:#171c20;color:#fff;border-radius:15px;padding:20px}.bank b{color:#f5e900}.thanks{text-align:center;margin:26px 0 0;font-weight:800}.actions{display:flex;gap:10px;margin:18px 0;flex-wrap:wrap}.actions button,.actions a{border:0;border-radius:10px;padding:12px 16px;background:#171c20;color:#fff;text-decoration:none;font:inherit;font-weight:800;cursor:pointer}@media(max-width:620px){.receipt{padding:22px}.grid{grid-template-columns:1fr}header{flex-direction:column}}@media print{body{background:#fff}.wrap{width:100%;margin:0}.receipt{box-shadow:none;border-radius:0}.actions{display:none}}</style></head><body><main class="wrap"><div class="actions"><button onclick="window.print()">Descargar / imprimir PDF</button><button id="shareBtn">Compartir</button><a href="index.html">Volver a la tienda</a></div><article class="receipt" id="receipt"><header><div><h1>ATP SUPLEMENTOS</h1><div class="muted">Comprobante de pedido — no válido como factura fiscal</div></div><img src="logo-atp.jpg" alt="ATP"></header><div id="content"><p>Cargando comprobante...</p></div><p class="thanks">Gracias por elegir ATP Suplementos.</p></article></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="data-service.js"></script><script>const money=v=>new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0}).format(v||0),esc=v=>String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));(async()=>{const tracking=new URLSearchParams(location.search).get('tracking');try{const o=await ATPData.getOrderByTracking(tracking),c=o.customer||{},a=c.address||{};if(!o)throw Error();content.innerHTML=`<div class="grid"><section class="box"><h2>PEDIDO</h2><p><b>${esc(o.tracking_code)}</b></p><p>${new Date(o.created_at).toLocaleString('es-AR')}</p><p>Estado: ${esc((o.status||'pendiente_pago').replaceAll('_',' '))}</p></section><section class="box"><h2>CLIENTE</h2><p><b>${esc(c.name)}</b></p><p>DNI/CUIT: ${esc(c.tax_id||'-')}</p><p>${esc(c.phone||'-')}</p><p>${esc(c.email||'-')}</p></section></div><section class="box"><h2>ENTREGA</h2><p>${esc([a.street,a.street_number,a.city,a.province,a.postal_code].filter(Boolean).join(', ')||'Retiro / a coordinar')}</p></section><table class="items"><thead><tr><th>Producto</th><th>Cant.</th><th>Importe</th></tr></thead><tbody>${(o.items||[]).map(x=>`<tr><td>${esc(x.name)} <span class="muted">${esc(x.brand||'')}</span></td><td>${x.quantity}</td><td>${money(Number(x.price)*Number(x.quantity))}</td></tr>`).join('')}</tbody></table><div class="totals"><div><span>Subtotal</span><b>${money(o.subtotal)}</b></div><div><span>Descuento</span><b>-${money(o.discount)}</b></div><div class="total"><span>Total</span><span>${money(o.total)}</span></div></div><section class="bank"><h2>DATOS DE TRANSFERENCIA</h2><p>Alias: <b>SUPLEMENTOSATP</b></p><p>CBU: <b>4530000800013046090593</b></p><p>Titular: Thiago La Valva</p></section>`;shareBtn.onclick=async()=>{const data={title:`Pedido ${o.tracking_code}`,text:`Comprobante del pedido ${o.tracking_code} por ${money(o.total)}`,url:location.href};if(navigator.share)await navigator.share(data);else{await navigator.clipboard.writeText(location.href);alert('Enlace copiado')}}}catch(_){content.innerHTML='<p>No se encontró el pedido.</p>'}})();</script></body></html>
